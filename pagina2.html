<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lección 1: Pronombres - Aprende Quechua</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="contenedor">
    <h1>🎵 Lección: Los Pronombres</h1>
    <p style="text-align: center; color: #B3B3B3;">Selecciona la traducción correcta para cada "pista".</p>

    <div class="tarjeta-pregunta">
        <h3>1. ¿Cómo se dice "Yo" en Quechua?</h3>
        <div class="grupo-opciones">
            <label class="opcion-item">
                <input type="radio" name="p1" value="incorrecto"> <span>Qam</span>
            </label>
            <label class="opcion-item">
                <input type="radio" name="p1" value="correcto"> <span>Ñuqa</span>
            </label>
            <label class="opcion-item">
                <input type="radio" name="p1" value="incorrecto"> <span>Pay</span>
            </label>
        </div>
    </div>

    <div class="tarjeta-pregunta">
        <h3>2. ¿Qué significa "Ñuqanchik"?</h3>
        <div class="grupo-opciones">
            <label class="opcion-item">
                <input type="radio" name="p2" value="correcto"> <span>Nosotros (Inclusivo)</span>
            </label>
            <label class="opcion-item">
                <input type="radio" name="p2" value="incorrecto"> <span>Ustedes</span>
            </label>
            <label class="opcion-item">
                <input type="radio" name="p2" value="incorrecto"> <span>Ellos</span>
            </label>
        </div>
    </div>

    <div style="text-align: center; margin: 30px 0;">
        <button onclick="verificarLeccion()" class="btn-principal">🎧 Verificar Respuestas</button>
        <p id="resultado-texto" class="mensaje-feedback"></p>
    </div>

    <div class="controles-reproductor">
        <a href="index.html" class="btn-secundario">⬅️ Volver</a>
        <a href="pagina3.html" id="btn-siguiente" class="btn-principal" style="display: none;">➡️ Ir al Examen</a>
    </div>
</div>

<script>
function verificarLeccion() {
    const p1 = document.querySelector('input[name="p1"]:checked');
    const p2 = document.querySelector('input[name="p2"]:checked');
    const feedback = document.getElementById('resultado-texto');
    const btnSiguiente = document.getElementById('btn-siguiente');

    if (!p1 || !p2) {
        feedback.innerHTML = "⚠️ ¡Faltan canciones por marcar!";
        feedback.style.color = "#FFCC00";
        return;
    }

    if (p1.value === "correcto" && p2.value === "correcto") {
        feedback.innerHTML = "✅ ¡Excelente ritmo! Todas son correctas.";
        feedback.style.color = "#1DB954";
        btnSiguiente.style.display = "inline-block"; // Aparece el botón para avanzar
    } else {
        feedback.innerHTML = "❌ Hay algo fuera de tono. Revisa tus respuestas.";
        feedback.style.color = "#FF4136";
    }
}
</script>

</body>
</html>
