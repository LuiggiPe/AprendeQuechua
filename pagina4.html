
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Examen Final - Aprende Quechua 🎓</title>
    <style>
        body {
            background-color: #000000;
            color: #FFFFFF;
            font-family: 'Segoe UI', Arial, sans-serif;
            margin: 0;
            display: flex;
            justify-content: center;
        }

        .contenedor {
            width: 100%;
            max-width: 500px;
            background-color: #121212;
            min-height: 100vh;
            padding: 20px;
            box-sizing: border-box;
            border-left: 1px solid #282828;
            border-right: 1px solid #282828;
            display: flex;
            flex-direction: column;
        }

        h1 { color: #1DB954; text-align: center; font-size: 1.6rem; margin-top: 10px; }
        .subtitulo { color: #b3b3b3; text-align: center; font-size: 0.85rem; margin-bottom: 20px; }

        /* RESULTADO ARRIBA */
        #resultado {
            text-align: center;
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 20px;
            display: none;
            font-weight: bold;
            font-size: 1.1rem;
        }

        .tarjeta-examen {
            background-color: #181818;
            padding: 15px;
            border-radius: 12px;
            margin-bottom: 15px;
            border: 1px solid #282828;
        }

        .pregunta-titulo {
            display: block;
            font-weight: bold;
            color: #1DB954;
            margin-bottom: 10px;
        }

        .opcion-item {
            display: flex;
            align-items: center;
            background-color: #282828;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 8px;
            cursor: pointer;
        }

        input[type="radio"] {
            margin-right: 12px;
            accent-color: #1DB954;
            transform: scale(1.2);
        }

        /* BOTONES DE ACCIÓN */
        .btn-calificar {
            background-color: #1DB954;
            color: #000;
            width: 100%;
            padding: 18px;
            border-radius: 50px;
            font-weight: bold;
            border: none;
            cursor: pointer;
            font-size: 1rem;
            margin: 10px 0 30px 0;
            text-transform: uppercase;
        }

        .controles-navegacion {
            display: flex;
            gap: 15px;
            padding-bottom: 50px;
            margin-top: 20px;
        }

        .btn-nav {
            flex: 1;
            background-color: #282828;
            color: #fff;
            text-align: center;
            padding: 15px;
            border-radius: 50px;
            text-decoration: none;
            font-weight: bold;
            border: 1px solid #444;
        }

        .btn-inicio {
            background-color: transparent;
            border: 1px solid #1DB954;
            color: #1DB954;
        }
    </style>
</head>
<body>

<div class="contenedor">
    <h1>Examen Final 🎓</h1>
    <p class="subtitulo">Completa todas las preguntas para ver tu nota</p>

    <div id="resultado"></div>

    <div class="tarjeta-examen">
        <span class="pregunta-titulo">1. ¿Cómo se dice "Nosotros" (Incluyente)?</span>
        <label class="opcion-item"><input type="radio" name="p1" value="c"> <span>Ñuqanchik</span></label>
        <label class="opcion-item"><input type="radio" name="p1" value="i"> <span>Ñuqayku</span></label>
    </div>

    <div class="tarjeta-examen">
        <span class="pregunta-titulo">2. ¿Cómo se dice "Ustedes"?</span>
        <label class="opcion-item"><input type="radio" name="p2" value="i"> <span>Paykuna</span></label>
        <label class="opcion-item"><input type="radio" name="p2" value="c"> <span>Qamkuna</span></label>
    </div>

    <div class="tarjeta-examen">
        <span class="pregunta-titulo">3. Traduce: "Allillanchu"</span>
        <label class="opcion-item"><input type="radio" name="p3" value="c"> <span>¿Cómo estás? / Hola</span></label>
        <label class="opcion-item"><input type="radio" name="p3" value="i"> <span>Adiós</span></label>
    </div>

    <button onclick="corregir()" class="btn-calificar">📊 Calificar Examen</button>

    <hr style="border: 0; border-top: 1px solid #282828; margin-bottom: 20px;">

    <div class="controles-navegacion">
        <a href="pagina3.html" class="btn-nav">⬅️ Repasar</a>
        <a href="index.html" class="btn-nav btn-inicio">🏠 Inicio</a>
    </div>
</div>

<script>
function corregir() {
    let aciertos = 0;
    const total = 3; // Ajusta este número según cuántas preguntas pongas
    
    for(let i=1; i<=total; i++) {
        const r = document.querySelector(`input[name="p${i}"]:checked`);
        if(r && r.value === "c") aciertos++;
    }

    const res = document.getElementById('resultado');
    res.style.display = "block";
    
    if(aciertos === total) {
        res.innerHTML = "🏆 ¡EXCELENTE! Nota: " + aciertos + "/" + total;
        res.style.backgroundColor = "#1DB954";
        res.style.color = "#000";
    } else {
        res.innerHTML = "📝 Nota: " + aciertos + "/" + total + "<br>¡Revisa y vuelve a intentar!";
        res.style.backgroundColor = "#FFD700";
        res.style.color = "#000";
    }

    // Sube la pantalla para ver el resultado
    window.scrollTo({top: 0, behavior: 'smooth'});
}
</script>

</body>
</html>
