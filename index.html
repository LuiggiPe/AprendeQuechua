<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Aprende Quechua 🦙</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#1DB954">

    <style>
        body {
            background-color: #000000;
            color: #FFFFFF;
            font-family: 'Segoe UI', Roboto, sans-serif;
            margin: 0;
            display: flex;
            justify-content: center;
        }

        .contenedor {
            width: 100%;
            max-width: 500px;
            background-color: #121212;
            min-height: 100vh;
            padding: 20px;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
        }

        h1 { color: #1DB954; text-align: center; font-size: 1.8rem; margin: 10px 0; }
        p { color: #b3b3b3; text-align: center; font-size: 0.9rem; margin-bottom: 20px; }
        
        /* Enlaces estilo bloque para que toda la caja sea clickeable */
        .link-caja { text-decoration: none; color: inherit; display: block; margin-bottom: 12px; }

        .banner-inicio {
            background: linear-gradient(180deg, #1DB954 0%, #121212 100%);
            padding: 25px;
            border-radius: 15px;
            text-align: center;
        }
        .banner-inicio h2 { color: #000; margin: 5px 0; font-size: 1.5rem; }
        .btn-blanco {
            display: inline-block;
            background: #fff;
            color: #000;
            padding: 10px 25px;
            border-radius: 20px;
            font-weight: bold;
            margin-top: 10px;
        }

        .tarjeta-item {
            display: flex;
            align-items: center;
            background-color: #181818;
            padding: 15px;
            border-radius: 12px;
            border: 1px solid #282828;
            transition: 0.2s;
        }
        .tarjeta-item:active { background-color: #282828; transform: scale(0.98); }

        .icono-caja {
            background-color: #282828;
            width: 45px; height: 45px;
            display: flex; align-items: center; justify-content: center;
            border-radius: 10px; font-size: 1.4rem; margin-right: 15px;
        }

        .info .nombre { display: block; font-weight: bold; font-size: 1rem; color: #fff; }
        .info .sub { font-size: 0.8rem; color: #b3b3b3; }

        .seccion-instalador {
            margin-top: auto;
            padding: 30px 0;
            text-align: center;
            border-top: 1px solid #282828;
        }

        .btn-instalar {
            background-color: #ffffff;
            color: #000;
            padding: 15px;
            border-radius: 50px;
            font-weight: bold;
            width: 100%;
            border: none;
            cursor: pointer;
            text-transform: uppercase;
            font-size: 0.85rem;
        }
    </style>
</head>
<body>

<div class="contenedor">
    <h1>APRENDE QUECHUA 🦙</h1>
    <p>Tu guía interactiva para el idioma Inca</p>

    <a href="./lecciones.html" class="link-caja">
        <div class="banner-inicio">
            <span style="color:#000; font-size:0.7rem; font-weight:900;">TEORÍA DISPONIBLE</span>
            <h2>Resumen de Temas</h2>
            <div class="btn-blanco">▶️ VER LECCIONES</div>
        </div>
    </a>

    <p style="color:#1DB954; font-weight:bold; margin-bottom:10px;">Menú Principal</p>

    <a href="./lecciones.html" class="link-caja">
        <div class="tarjeta-item" style="border-left: 5px solid #1DB954;">
            <div class="icono-caja">📚</div>
            <div class="info">
                <span class="nombre">Lecciones</span>
                <span class="sub">Teoría de Pronombres y Saludos</span>
            </div>
            <span style="margin-left: auto; color: #1DB954;">➔</span>
        </div>
    </a>

    <a href="./pagina2.html" class="link-caja">
        <div class="tarjeta-item">
            <div class="icono-caja">🦙</div>
            <div class="info">
                <span class="nombre">Práctica: Pronombres</span>
                <span class="sub">Nivel 1 básico</span>
            </div>
        </div>
    </a>

    <a href="./pagina3.html" class="link-caja">
        <div class="tarjeta-item">
            <div class="icono-caja">👋</div>
            <div class="info">
                <span class="nombre">Práctica: Saludos</span>
                <span class="sub">Cortesía en Quechua</span>
            </div>
        </div>
    </a>

    <a href="./pagina4.html" class="link-caja">
        <div class="tarjeta-item" style="border: 1px solid #1DB954;">
            <div class="icono-caja" style="background:#1DB954; color:#000;">🎓</div>
            <div class="info">
                <span class="nombre">Examen Final</span>
                <span class="sub">Mide tu conocimiento</span>
            </div>
        </div>
    </a>

    <div class="seccion-instalador" id="install-area" style="display: none;">
        <button id="btn-instalar-pwa" class="btn-instalar">📲 INSTALAR APP LLAMA</button>
    </div>
</div>

<script>
    let eventoInstalacion;
    const areaInstalacion = document.getElementById('install-area');
    const botonInstalar = document.getElementById('btn-instalar-pwa');

    window.addEventListener('beforeinstallprompt', (e) => {
        e.preventDefault();
        eventoInstalacion = e;
        areaInstalacion.style.display = 'block';
    });

    botonInstalar.addEventListener('click', async () => {
        if (eventoInstalacion) {
            eventoInstalacion.prompt();
            eventoInstalacion = null;
            areaInstalacion.style.display = 'none';
        }
    });
</script>

</body>
</html>
